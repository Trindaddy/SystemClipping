services:
  # --- Banco de Dados ---
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=clipping_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    networks:
      - clipping_net

  # --- Fila de Mensagens ---
  redis:
    image: redis:alpine
    ports:
      - "6380:6379"
    networks:
      - clipping_net

  # --- Automação (N8n) ---
  n8n:
    image: n8nio/n8n:2.15.0
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=admin
    volumes:
      - ./n8n_data:/home/node/.n8n
    depends_on:
      - db
    networks:
      - clipping_net

  # --- API Django ---
  api:
    build: ./backend
    container_name: api_backend  # <--- CRACHÁ FIXO PARA O N8N ACHAR
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
    networks:
      - clipping_net

  # --- Frontend React ---
  web:
    build: ./frontend
    command: npm run dev -- --host
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    networks:
      - clipping_net

# --- Configuração de Volumes e Redes ---
volumes:
  postgres_data:
  n8n_data:

networks:
  clipping_net:  # <--- NOSSA REDE PRIVADA BLINDADA
    driver: bridge